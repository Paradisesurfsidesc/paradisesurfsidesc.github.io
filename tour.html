<!-- tour.html -->
<!-- Date - 2026-04-14 -->
<!-- Version - 1.0.0 -->
<!-- Notes - Matterport virtual tour page; matched site shell to index.html; header/menu injected via assets/site.js; responsive embed -->
<!-- Author - David Taylor -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Paradise | Virtual Tour</title>

  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/site.js" defer></script>

  <style>
    .page-shell {
      min-height: 100vh;
      padding: 120px 20px 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .tour-page {
      width: min(1200px, 100%);
      display: grid;
      gap: 18px;
    }

    .tour-card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .tour-header {
      padding: 22px 22px 8px;
      text-align: center;
    }

    .tour-header h1 {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3rem);
      letter-spacing: 0.04em;
    }

    .tour-header p {
      margin: 10px auto 0;
      max-width: 760px;
      line-height: 1.6;
      font-size: 1rem;
      color: #444;
    }

    .tour-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .tour-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    @media (max-width: 768px) {
      .page-shell {
        padding: 100px 14px 28px;
      }

      .tour-header {
        padding: 18px 16px 8px;
      }

      .tour-header p {
        font-size: 0.95rem;
      }

      .tour-container {
        aspect-ratio: 4 / 3;
      }
    }
  </style>
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page-shell">
    <section class="tour-page" aria-label="Virtual tour page">
      <div class="tour-card">
        <div class="tour-header">
          <h1>Paradise Virtual Tour</h1>
          <p>Take a full interactive walk-through of the property and explore the space before you arrive.</p>
        </div>

        <div class="tour-container">
          <iframe
            src="https://my.matterport.com/show/?m=514mJVRB8oL&brand=0&mls=1"
            loading="lazy"
            allowfullscreen
            allow="xr-spatial-tracking; fullscreen"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
