<!-- photos.html -->
<!-- Date - 2026-04-14 -->
<!-- Version - 1.1.0 -->
<!-- Notes - Added lightbox modal; corrected thumbnail file references; reordered numbered photos and fixed captions -->
<!-- Author - David Taylor -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Paradise | Photos</title>

  <!-- Favicons -->
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="images/paradise-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/paradise-16.png">
  <link rel="apple-touch-icon" href="images/paradise-180.png">
  <link rel="manifest" href="images/site.webmanifest">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/site.js" defer></script>

  <style>
    .page-shell {
      min-height: 100vh;
      padding: calc(var(--headerH) + 12px) 20px 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .photos-page-card {
      width: 100%;
      max-width: 1200px;
    }

    .photos-page-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .photos-page-header h1 {
      margin-bottom: 10px;
    }

    .photos-page-header p {
      max-width: 760px;
      margin: 0 auto;
    }

    .photo-section {
      margin-top: 34px;
    }

    .photo-section h2 {
      margin: 0 0 14px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .photo-card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    .photo-button {
      width: 100%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      color: inherit;
      font: inherit;
      display: block;
    }

    .photo-thumb-wrap {
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.06);
    }

    .photo-thumb {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.25s ease;
    }

    .photo-button:hover .photo-thumb,
    .photo-button:focus-visible .photo-thumb {
      transform: scale(1.03);
    }

    .photo-copy {
      padding: 14px 14px 16px;
    }

    .photo-copy h3 {
      margin: 0 0 6px;
      font-size: 1.02rem;
      line-height: 1.25;
    }

    .photo-copy p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.9;
      line-height: 1.45;
    }

    .photo-badge {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-backdrop {
      position: absolute;
      inset: 0;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .lightbox-dialog {
      position: relative;
      z-index: 1;
      width: min(1100px, 100%);
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lightbox-close {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
      background: #ffffff;
      color: #111111;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .lightbox-figure {
      margin: 0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
    }

    .lightbox-image {
      width: 100%;
      max-height: calc(100vh - 150px);
      display: block;
      object-fit: contain;
      background: #111111;
    }

    .lightbox-caption {
      margin: 0;
      padding: 14px 16px 16px;
      color: #ffffff;
      text-align: center;
      line-height: 1.45;
    }

    .is-hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 90px 14px 28px;
      }

      .photo-grid {
        grid-template-columns: 1fr;
      }

      .photo-copy h3 { font-size: .95rem; }
      .photo-copy p  { font-size: .88rem; }

      .lightbox {
        padding: 14px;
      }

      .lightbox-close {
        top: 8px;
        right: 8px;
      }
    }

    @media (max-width: 420px) {
      .page-shell {
        padding: 82px 10px 24px;
      }
    }
  </style>
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page-shell">
    <section class="photos-page-card" aria-label="Property photo gallery">
      <div class="photos-page-header">
        <h1>Photo Gallery</h1>
        <p>Browse Paradise room by room. Click any image to view it full size, then close with the X, by clicking outside the image, or by pressing Escape.</p>
      </div>

      <section class="photo-section" aria-labelledby="gallery-highlights-heading">
        <h2 id="gallery-highlights-heading">Highlights</h2>
        <div class="photo-grid" id="highlightsGrid"></div>
      </section>

      <section class="photo-section" aria-labelledby="gallery-numbered-heading">
        <h2 id="gallery-numbered-heading">Full Photo Tour</h2>
        <div class="photo-grid" id="numberedGrid"></div>
      </section>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-backdrop" id="lightboxBackdrop" type="button" aria-label="Close full-size image"></button>

    <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
      <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close full-size image">&times;</button>

      <figure class="lightbox-figure">
        <img class="lightbox-image" id="lightboxImage" src="" alt="">
        <figcaption class="lightbox-caption" id="lightboxTitle"></figcaption>
      </figure>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var highlights = [
        {
          file: 'images/1-web-or-mls-MAIN THUMBNAIL.jpg',
          title: 'Welcome to Paradise',
          description: 'A stunning 4-bedroom beach retreat in Surfside Beach, SC — just steps from the sand.'
        },
        {
          file: 'images/4-web-or-mls-For social media.jpg',
          title: 'The Full Picture',
          description: 'Everything that makes Paradise special — pool, space, location, and coastal charm.'
        },
        {
          file: 'images/9-web-or-mls-INTERIOR.jpg',
          title: 'Open Living & Dining',
          description: 'Bright, open-concept main floor designed for family gatherings and relaxed beach evenings.'
        },
        {
          file: 'images/39-web-or-mls-Outdoor.jpg',
          title: 'Your Private Oasis',
          description: 'Heated and cooled private pool, lounge deck, and outdoor living just steps from the back door.'
        },
        {
          file: 'images/48-web-or-mls-Location.jpg',
          title: 'Prime Location',
          description: 'Perfectly positioned in Surfside Beach — a short walk to the ocean and everything the area offers.'
        },
        {
          file: 'images/Twilight.png',
          title: 'Paradise at Twilight',
          description: 'Paradise glows at dusk — welcoming guests home after a perfect day at the beach.'
        },
        {
          file: 'images/2-web-or-mls-0.jpg',
          title: 'Evening Curb Appeal',
          description: 'The charming three-story exterior lit up as the Surfside Beach evening settles in.'
        }
      ];

      var numberedPhotos = [
        // Exterior
        { file: 'images/3-web-or-mls-1.jpg', title: 'Front Exterior', description: 'The welcoming front of Paradise — palm trees, wide driveway, and three stories of coastal charm.' },

        // Living areas
        { file: 'images/5-web-or-mls-2.jpeg', title: 'Living & Dining Room', description: 'Open-concept main floor with sofa seating, dining table for 8, and balcony access on both sides.' },
        { file: 'images/6-web-or-mls-3.jpeg', title: 'Living Room', description: 'Comfortable sectional seating, large flat-screen TV, and coastal artwork — made for relaxed evenings.' },
        { file: 'images/7-web-or-mls-4.jpeg', title: 'Open Floor Plan', description: 'Wide view of the main floor showing the living room, dining area, and kitchen all in one open space.' },
        { file: 'images/8-web-or-mls-5.jpeg', title: 'Games & Entertainment', description: "Poker set, puzzles, checkers, and cards included — rainy day or game night, you're covered." },
        { file: 'images/10-web-or-mls-6.jpeg', title: 'Dining Room', description: 'Bar-height dining table seats 8 comfortably with balcony access and TV in view.' },
        { file: 'images/11-web-or-mls-7.jpeg', title: 'Dining Room', description: 'The dining area opens to both the living room and kitchen — great sightlines for the whole group.' },
        { file: 'images/12-web-or-mls-8.JPG', title: 'Lower Balcony', description: 'Covered lower balcony with seating and neighborhood views — a quiet spot for morning coffee.' },

        // Kitchen
        { file: 'images/13-web-or-mls-9.jpeg', title: 'Kitchen', description: 'Marble island with bar seating, white shaker cabinets, and everything stocked for home cooking.' },
        { file: 'images/14-web-or-mls-10.jpeg', title: 'Kitchen', description: 'Full-size stainless appliances — range, refrigerator, microwave, and dishwasher all included.' },
        { file: 'images/15-web-or-mls-11.jpeg', title: 'Kitchen', description: 'The kitchen runs the length of the home with generous prep space and a clear view to the dining room.' },
        { file: 'images/16-web-or-mls-12a.jpg', title: 'Kitchen — Coffee Station', description: 'Keurig coffee maker stocked and ready — start every beach morning right.' },
        { file: 'images/17-web-or-mls-13.jpeg', title: 'Kitchen — Sink', description: 'Deep stainless sink with hand soap and dish soap provided.' },

        // Master bedroom & bath
        { file: 'images/18-web-or-mls-14.jpeg', title: 'Master Bedroom', description: 'King bed, vaulted ceiling, French doors to the private balcony, and a flat-screen TV.' },
        { file: 'images/19-web-or-mls-15.jpeg', title: 'Master Bedroom', description: 'Alternate view of the king master suite — bright and spacious with en suite bathroom just steps away.' },
        { file: 'images/20-web-or-mls-16.jpeg', title: 'Master Bathroom', description: 'Double vessel sinks, dark vanity, jetted tub, and two mirrors — the most luxurious bath in the house.' },
        { file: 'images/21-web-or-mls-17.jpeg', title: 'Master Bathroom — Jetted Tub', description: 'Soak in the jetted tub after a long beach day — candles and a plant set the mood.' },

        // Other bedrooms
        { file: 'images/22-web-or-mls-18.jpeg', title: 'Queen Bedroom', description: 'Quiet queen bedroom with two nightstands, flat-screen TV, and a clean, comfortable layout.' },
        { file: 'images/23-web-or-mls-19.jpeg', title: 'Queen Bedroom + Sleeper Sofa', description: 'Queen bed plus a pullout sleeper sofa — sleeps up to 3 and works great for families.' },
        { file: 'images/24-web-or-mls-20.jpeg', title: 'Queen Bedroom + Sleeper Sofa', description: 'Both beds made and ready — lamp, tray, and nightstand between them for easy sharing.' },
        { file: 'images/27-web-or-mls-23.jpeg', title: 'Double Queen Bedroom', description: 'Two queen beds with matching decor and a shared nightstand — perfect for siblings or friends.' },
        { file: 'images/28-web-or-mls-24.jpeg', title: 'Double Queen Bedroom', description: 'Detail view between the two beds — extra lamp, remote, and a tray with travel essentials.' },

        // Bathrooms
        { file: 'images/25-web-or-mls-21.jpeg', title: 'Upstairs Shared Bathroom', description: 'Double vanity shared between the bunk room and upstairs hallway — plenty of sink space for everyone.' },
        { file: 'images/26-web-or-mls-22.jpeg', title: 'Bathroom', description: 'Tub/shower combo with VW surfboard art — clean, bright, and stocked with towels.' },
        { file: 'images/29-web-or-mls-25.jpeg', title: 'Bathroom', description: 'Full bathroom with tub/shower, single vanity, and good natural light.' },

        // Bunk room
        { file: 'images/31-web-or-mls-26.jpeg', title: 'Bunk Room', description: 'Two sets of twin bunk beds — sleeps 4, with a closet and foam floor tiles for safety.' },
        { file: 'images/32-web-or-mls-27.jpeg', title: 'Bunk Room', description: 'Bunk room with TV and direct access to the upstairs shared bathroom through the doorway.' },
        { file: 'images/33-web-or-mls-28.jpeg', title: 'Bunk Room — Games', description: 'Checkers, playing cards, and puzzles stored in the bunk room — kids have everything they need.' },

        // Laundry
        { file: 'images/34-web-or-mls-29.jpeg', title: 'Laundry Room', description: 'Full-size washer and dryer with storage shelving — a lifesaver on longer stays.' },

        // Outdoor / Pool
        { file: 'images/40-web-or-mls-33a.jpg', title: 'Gas Grill', description: 'Full-size gas grill right by the pool — fire it up for burgers and hot dogs any night of the week.' },
        { file: 'images/43-web-or-mls-35.jpeg', title: 'Private Pool', description: 'Your own private heated or cooled pool with loungers on both sides and a fenced yard.' },
        { file: 'images/44-print-36.jpg', title: 'Pool — Poolside Ambiance', description: 'Champagne glasses on the deck with the pool in the background — vacations are supposed to feel like this.' },
        { file: 'images/46-web-or-mls-37.jpeg', title: 'Pool Deck', description: 'Towels waiting at the ready — the pool deck is spacious, well-maintained, and easy to enjoy.' },

        // Aerial
        { file: 'images/52-web-or-mls-41a.jpeg', title: 'Aerial — Paradise Highlighted', description: 'Paradise marked from above — one block from the beach with the pool clearly visible.' },
        { file: 'images/54-web-or-mls-42.jpeg', title: 'Aerial — Neighborhood', description: "Wider aerial showing Paradise's location in the Surfside Beach neighborhood, steps from the water." },
        { file: 'images/57-web-or-mls-44a.jpeg', title: 'Aerial — Coastline', description: 'The full Surfside Beach shoreline from above — Paradise is right in the heart of it.' }
      ];

      var highlightsGrid = document.getElementById('highlightsGrid');
      var numberedGrid = document.getElementById('numberedGrid');

      var lightbox = document.getElementById('lightbox');
      var lightboxImage = document.getElementById('lightboxImage');
      var lightboxTitle = document.getElementById('lightboxTitle');
      var lightboxClose = document.getElementById('lightboxClose');
      var lightboxBackdrop = document.getElementById('lightboxBackdrop');

      function createCard(item, badgeText) {
        var card = document.createElement('article');
        card.className = 'photo-card';

        var button = document.createElement('button');
        button.className = 'photo-button';
        button.type = 'button';
        button.setAttribute('aria-label', 'Open full-size image: ' + item.title);

        button.innerHTML =
          '<div class="photo-thumb-wrap">' +
            '<img class="photo-thumb" src="' + item.file + '" alt="' + item.title + '" loading="lazy">' +
          '</div>' +
          '<div class="photo-copy">' +
            '<span class="photo-badge">' + badgeText + '</span>' +
            '<h3>' + item.title + '</h3>' +
            '<p>' + item.description + '</p>' +
          '</div>';

        button.addEventListener('click', function () {
          openLightbox(item);
        });

        var thumb = button.querySelector('img');
        thumb.addEventListener('error', function () {
          card.classList.add('is-hidden');
        });

        card.appendChild(button);
        return card;
      }

      function renderGrid(target, items, badgeText) {
        items.forEach(function (item) {
          target.appendChild(createCard(item, badgeText));
        });
      }

      function openLightbox(item) {
        lightboxImage.src = item.file;
        lightboxImage.alt = item.title;
        lightboxTitle.textContent = item.title + ' — ' + item.description;
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        lightboxImage.src = '';
        lightboxImage.alt = '';
        lightboxTitle.textContent = '';
        document.body.style.overflow = '';
      }

      lightboxClose.addEventListener('click', closeLightbox);
      lightboxBackdrop.addEventListener('click', closeLightbox);

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && lightbox.classList.contains('open')) {
          closeLightbox();
        }
      });

      renderGrid(highlightsGrid, highlights, 'Highlight');
      renderGrid(numberedGrid, numberedPhotos, 'Photo');
    });
  </script>
</body>
</html>
