<!-- Date - 2026-04-14 -->
<!-- Version - 1.1.0 -->
<!-- Notes - Added lightbox modal; corrected thumbnail file references; reordered numbered photos and fixed captions -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Paradise | Photos</title>

  <!-- Favicons -->
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="images/paradise-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/paradise-16.png">
  <link rel="apple-touch-icon" href="images/paradise-180.png">
  <link rel="manifest" href="images/site.webmanifest">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="assets/site.js" defer></script>

  <style>
    .page-shell {
      min-height: 100vh;
      padding: calc(var(--headerH) + 12px) 20px 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .photos-page-card {
      width: 100%;
      max-width: 1200px;
    }

    .photos-page-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .photos-page-header h1 {
      margin-bottom: 10px;
    }

    .photos-page-header p {
      max-width: 760px;
      margin: 0 auto;
    }

    .photo-section {
      margin-top: 34px;
    }

    .photo-section h2 {
      margin: 0 0 14px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .photo-card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    .photo-button {
      width: 100%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      color: inherit;
      font: inherit;
      display: block;
    }

    .photo-thumb-wrap {
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.06);
    }

    .photo-thumb {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.25s ease;
    }

    .photo-button:hover .photo-thumb,
    .photo-button:focus-visible .photo-thumb {
      transform: scale(1.03);
    }

    .photo-copy {
      padding: 14px 14px 16px;
    }

    .photo-copy h3 {
      margin: 0 0 6px;
      font-size: 1.02rem;
      line-height: 1.25;
    }

    .photo-copy p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.9;
      line-height: 1.45;
    }

    .photo-badge {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-backdrop {
      position: absolute;
      inset: 0;
      background: transparent;
      border: 0;
      cursor: pointer;
    }

    .lightbox-dialog {
      position: relative;
      z-index: 1;
      width: min(1100px, 100%);
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lightbox-close {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
      background: #ffffff;
      color: #111111;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    .lightbox-figure {
      margin: 0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
    }

    .lightbox-image {
      width: 100%;
      max-height: calc(100vh - 150px);
      display: block;
      object-fit: contain;
      background: #111111;
    }

    .lightbox-caption {
      margin: 0;
      padding: 14px 16px 16px;
      color: #ffffff;
      text-align: center;
      line-height: 1.45;
    }

    .is-hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 90px 14px 28px;
      }

      .photo-grid {
        grid-template-columns: 1fr;
      }

      .photo-copy h3 { font-size: .95rem; }
      .photo-copy p  { font-size: .88rem; }

      .lightbox {
        padding: 14px;
      }

      .lightbox-close {
        top: 8px;
        right: 8px;
      }
    }

    @media (max-width: 420px) {
      .page-shell {
        padding: 82px 10px 24px;
      }
    }
  </style>
</head>

<body>
  <header id="siteHeader"></header>

  <main class="page-shell">
    <section class="photos-page-card" aria-label="Property photo gallery">
      <div class="photos-page-header">
        <h1>Photo Gallery</h1>
        <p>Browse Paradise room by room. Click any image to view it full size, then close with the X, by clicking outside the image, or by pressing Escape.</p>
      </div>

      <section class="photo-section" aria-labelledby="gallery-highlights-heading">
        <h2 id="gallery-highlights-heading">Highlights</h2>
        <div class="photo-grid" id="highlightsGrid"></div>
      </section>

      <section class="photo-section" aria-labelledby="gallery-numbered-heading">
        <h2 id="gallery-numbered-heading">Full Photo Tour</h2>
        <div class="photo-grid" id="numberedGrid"></div>
      </section>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-backdrop" id="lightboxBackdrop" type="button" aria-label="Close full-size image"></button>

    <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
      <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close full-size image">&times;</button>

      <figure class="lightbox-figure">
        <img class="lightbox-image" id="lightboxImage" src="" alt="">
        <figcaption class="lightbox-caption" id="lightboxTitle"></figcaption>
      </figure>
    </div>
  </div>

        }
      ];

      var numberedPhotos = [
        { file: 'images/2-web-or-mls-0.jpg', title: 'Living & Dining Room', description: 'Spacious open-concept main floor with plenty of room for the whole group to gather.' },
        { file: 'images/3-web-or-mls-1.jpg', title: 'Living Room', description: 'Comfortable seating, a large flat-screen TV, and coastal décor set the tone for relaxed evenings.' },
        { file: 'images/5-web-or-mls-2.jpeg', title: 'Living Room', description: 'The living room flows naturally into the dining area — open, airy, and easy to move through.' },

        { file: 'images/6-web-or-mls-3.jpeg', title: 'Dining Room', description: 'Seats 8 comfortably at the main dining table with natural light and open sightlines to the kitchen.' },
        { file: 'images/7-web-or-mls-4.jpeg', title: 'Dining Room', description: 'The dining area from the kitchen side — perfect for family meals and long evenings around the table.' },

        { file: 'images/8-web-or-mls-5.jpeg', title: 'Lower Balcony', description: 'Covered lower balcony with outdoor seating — a quiet spot for morning coffee or evening breezes.' },

        { file: 'images/10-web-or-mls-6.jpeg', title: 'Kitchen', description: 'Fully stocked kitchen with modern appliances, generous counter space, and island seating.' },
        { file: 'images/11-web-or-mls-7.jpeg', title: 'Kitchen', description: 'Open kitchen layout with room to cook, prep, and socialize all at once.' },
        { file: 'images/12-web-or-mls-8.JPG', title: 'Kitchen — Bar Seating', description: 'Bar-height counter seating — great for casual breakfasts or keeping the cook company.' },
        { file: 'images/13-web-or-mls-9.jpeg', title: 'Kitchen — Prep Area', description: 'Well-organized prep space with quality appliances and plenty of cabinet storage.' },
        { file: 'images/14-web-or-mls-10.jpeg', title: 'Kitchen — Appliances', description: 'Equipped with a full-size refrigerator, coffee maker, and everything needed for a home-cooked meal.' },

        { file: 'images/23-web-or-mls-19.jpeg', title: 'Upstairs Master Bedroom', description: 'King bed, private en suite bathroom, and serene coastal styling — the perfect retreat after a beach day.' },
        { file: 'images/24-web-or-mls-20.jpeg', title: 'Upstairs Master Bedroom', description: 'Bright and spacious master suite with room to unwind in comfort.' },

        { file: 'images/25-web-or-mls-21.jpeg', title: 'Master Bathroom', description: 'Private master bathroom with dual vanity, walk-in shower, and ample storage.' },
        { file: 'images/26-web-or-mls-22.jpeg', title: 'Master Bathroom', description: 'Clean, bright, and fully appointed — everything you need without leaving the suite.' },

        { file: 'images/42-web-or-mls-34.jpeg', title: 'Outdoor Shower', description: 'Rinse off the sand with the outdoor shower and foot wash station before heading inside.' },

        { file: 'images/49-web-or-mls-39.JPG', title: 'Front Exterior', description: 'The welcoming front of Paradise — well-maintained, charming, and a short walk to the beach.' },
        { file: 'images/50-web-or-mls-40.JPG', title: 'Rear Exterior', description: 'Rear exterior view showing the pool deck, balconies, and full layout of the home.' },
        { file: 'images/51-web-or-mls-41.JPG', title: 'Aerial View', description: "Bird's-eye view of Paradise and the surrounding Surfside Beach neighborhood." },
        { file: 'images/52-web-or-mls-41a.jpeg', title: 'Aerial — Paradise Highlighted', description: 'Paradise marked from above — easy to spot just blocks from the Atlantic.' },
        { file: 'images/53-web-or-mls-42.JPG', title: 'Aerial — Beach Access', description: 'Aerial view of the Surfside Beach shoreline — Paradise is a short, easy walk from here.' },
        { file: 'images/54-web-or-mls-42.jpeg', title: 'Aerial — Coastline', description: 'Another aerial look at the coastline and the community surrounding Paradise.' },
        { file: 'images/55-web-or-mls-43.JPG', title: 'Rear Exterior — Elevated', description: 'Elevated rear view showing the roofline, balconies, and the backyard pool area below.' },
        { file: 'images/56-web-or-mls-44.JPG', title: 'Aerial — Shoreline', description: 'Wide-angle aerial of the Surfside Beach shoreline — the ocean is never far from Paradise.' }
      ];

      var highlightsGrid = document.getElementById('highlightsGrid');
      var numberedGrid = document.getElementById('numberedGrid');

      var lightbox = document.getElementById('lightbox');
      var lightboxImage = document.getElementById('lightboxImage');
      var lightboxTitle = document.getElementById('lightboxTitle');
      var lightboxClose = document.getElementById('lightboxClose');
      var lightboxBackdrop = document.getElementById('lightboxBackdrop');

      function createCard(item, badgeText) {
        var card = document.createElement('article');
        card.className = 'photo-card';

        var button = document.createElement('button');
        button.className = 'photo-button';
        button.type = 'button';
        button.setAttribute('aria-label', 'Open full-size image: ' + item.title);

        button.innerHTML =
          '<div class="photo-thumb-wrap">' +
            '<img class="photo-thumb" src="' + item.file + '" alt="' + item.title + '" loading="lazy">' +
          '</div>' +
          '<div class="photo-copy">' +
            '<span class="photo-badge">' + badgeText + '</span>' +
            '<h3>' + item.title + '</h3>' +
            '<p>' + item.description + '</p>' +
          '</div>';

        button.addEventListener('click', function () {
          openLightbox(item);
        });

        var thumb = button.querySelector('img');
        thumb.addEventListener('error', function () {
          card.classList.add('is-hidden');
        });

        card.appendChild(button);
        return card;
      }

      function renderGrid(target, items, badgeText) {
        items.forEach(function (item) {
          target.appendChild(createCard(item, badgeText));
        });
      }

      function openLightbox(item) {
        lightboxImage.src = item.file;
        lightboxImage.alt = item.title;
        lightboxTitle.textContent = item.title + ' — ' + item.description;
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden', 'true');
        lightboxImage.src = '';
        lightboxImage.alt = '';
        lightboxTitle.textContent = '';
        document.body.style.overflow = '';
      }

      lightboxClose.addEventListener('click', closeLightbox);
      lightboxBackdrop.addEventListener('click', closeLightbox);

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && lightbox.classList.contains('open')) {
          closeLightbox();
        }
      });

      renderGrid(highlightsGrid, highlights, 'Highlight');
      renderGrid(numberedGrid, numberedPhotos, 'Photo');
    });
  </script>
</body>
</html>
