<!-- admin/index.html -->
<!-- Date - 2026-05-03 -->
<!-- Version - 1.0.0 -->
<!-- Notes - Password-protected admin: bookings, market report, events calendar -->
<!-- Author - David Taylor -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Admin — Paradise Surfside Beach</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    /* ── Login ─────────────────────────────────────────────── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 360px;
    }
    .login-card h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
    .login-card > p { color: var(--muted); font-size: .9rem; margin: 0 0 2rem; }
    .login-field { display: grid; gap: .4rem; margin-bottom: 1rem; }
    .login-field label { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .login-field input {
      padding: .75rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }
    .login-field input:focus { border-color: var(--accent); }
    .login-error { color: #f87171; font-size: .875rem; margin-bottom: .75rem; display: none; }
    .login-btn {
      width: 100%;
      padding: .875rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #1b1b1b;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* ── Admin shell ────────────────────────────────────────── */
    .admin-screen { display: none; min-height: 100vh; flex-direction: column; }
    .admin-screen.visible { display: flex; }

    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .875rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--cardBorder);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .admin-brand { font-weight: 800; font-size: 1rem; white-space: nowrap; }
    .admin-brand span { color: var(--accent); }

    .admin-tabs { display: flex; gap: .25rem; }
    .admin-tab {
      padding: .45rem .9rem;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: .875rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: all .15s;
    }
    .admin-tab.active { background: var(--accent); color: #1b1b1b; }

    .signout-btn {
      padding: .4rem .875rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: var(--muted);
      font-size: .8rem;
      font-family: inherit;
      cursor: pointer;
    }
    .signout-btn:hover { color: var(--text); }

    .admin-content {
      flex: 1;
      padding: 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* ── KPI row ────────────────────────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .kpi-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; margin-bottom: .3rem; }
    .kpi-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

    /* ── Section header ─────────────────────────────────────── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-header h2 { font-size: 1.1rem; margin: 0; }

    /* ── Table ──────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--cardBorder); }
    .admin-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .admin-table th {
      padding: .625rem 1rem;
      text-align: left;
      background: var(--surface);
      color: var(--muted);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--cardBorder);
      white-space: nowrap;
    }
    .admin-table td {
      padding: .75rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      vertical-align: middle;
      white-space: nowrap;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: rgba(255,255,255,.03); }

    .status-badge { display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .72rem; font-weight: 700; }
    .s-confirmed { background: rgba(52,211,153,.15); color: #34d399; }
    .s-tentative  { background: rgba(251,191,36,.15); color: #fbbf24; }
    .s-completed  { background: rgba(148,163,184,.15); color: #94a3b8; }
    .s-cancelled  { background: rgba(248,113,113,.15); color: #f87171; }

    .btn-sm {
      padding: .28rem .65rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.15);
      background: transparent;
      color: var(--muted);
      font-size: .78rem;
      font-family: inherit;
      cursor: pointer;
      margin-left: .25rem;
    }
    .btn-sm:hover { color: var(--text); }
    .btn-sm.del:hover { color: #f87171; border-color: rgba(248,113,113,.4); }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { margin: 0 0 1.5rem; font-size: 1.2rem; }

    .form-row { display: grid; gap: .4rem; margin-bottom: 1rem; }
    .form-row label { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .form-row input,
    .form-row select,
    .form-row textarea {
      padding: .625rem .875rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
    }
    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus { border-color: var(--accent); }
    .form-row select option { background: #0b1b2a; }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; }

    /* ── Market ─────────────────────────────────────────────── */
    .season-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .season-tab {
      padding: .5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--cardBorder);
      background: var(--surface);
      color: var(--muted);
      font-size: .875rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
    }
    .season-tab.active { border-color: var(--accent); color: var(--accent); }

    .market-summary {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .market-summary-item .ms-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; margin-bottom: .2rem; }
    .market-summary-item .ms-val { font-size: 1.15rem; font-weight: 800; }

    .comp-grid { display: grid; gap: .75rem; }
    .comp-row {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 12px;
      padding: .875rem 1.25rem;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1.2fr;
      gap: 1rem;
      align-items: center;
    }
    .comp-row.is-paradise { border-color: var(--accent); background: rgba(255,200,50,.04); }
    .comp-name { font-weight: 700; font-size: .95rem; }
    .comp-meta { font-size: .78rem; color: var(--muted); margin-top: .15rem; line-height: 1.4; }
    .rate-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
    .rate-val { font-weight: 700; font-size: .95rem; }
    .rate-val.highlight { color: var(--accent); }

    /* ── Events ─────────────────────────────────────────────── */
    .year-toggle { display: flex; gap: .25rem; margin-bottom: 1.5rem; }
    .year-btn {
      padding: .5rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--cardBorder);
      background: var(--surface);
      color: var(--muted);
      font-size: .9rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 700;
    }
    .year-btn.active { background: var(--accent); color: #1b1b1b; border-color: var(--accent); }

    .events-list { display: grid; gap: .75rem; }
    .event-month-card {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 12px;
      overflow: hidden;
    }
    .event-month-head {
      padding: .625rem 1.25rem;
      background: rgba(255,255,255,.04);
      font-weight: 700;
      font-size: .9rem;
      border-bottom: 1px solid var(--cardBorder);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .event-item {
      padding: .625rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: .75rem;
      align-items: start;
      font-size: .875rem;
    }
    .event-item:last-child { border-bottom: none; }
    .event-date { color: var(--muted); font-size: .8rem; padding-top: .1rem; white-space: nowrap; }
    .event-name { font-weight: 600; }
    .event-detail { font-size: .78rem; color: var(--muted); margin-top: .1rem; }
    .impact { font-size: .7rem; font-weight: 700; padding: .15rem .5rem; border-radius: 999px; white-space: nowrap; }
    .impact-high     { background: rgba(248,113,113,.15); color: #f87171; }
    .impact-moderate { background: rgba(251,191,36,.15);  color: #fbbf24; }
    .impact-low      { background: rgba(148,163,184,.15); color: #94a3b8; }

    .empty-note { padding: 2rem; text-align: center; color: var(--muted); }

    @media (max-width: 700px) {
      .admin-tabs { gap: .125rem; }
      .admin-tab { padding: .4rem .6rem; font-size: .78rem; }
      .comp-row { grid-template-columns: 1fr 1fr; }
      .form-2col { grid-template-columns: 1fr; }
      .event-item { grid-template-columns: 1fr; gap: .25rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>🏠 Paradise Admin</h1>
      <p>Sign in to manage bookings and market data.</p>
      <div class="login-field">
        <label for="lUser">Username</label>
        <input type="text" id="lUser" value="admin" autocomplete="username">
      </div>
      <div class="login-field">
        <label for="lPass">Password</label>
        <input type="password" id="lPass" autocomplete="current-password">
      </div>
      <div class="login-error" id="lError">Incorrect username or password.</div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin-screen" id="adminScreen">
    <div class="admin-topbar">
      <div class="admin-brand">🏠 Paradise <span>Admin</span></div>
      <div class="admin-tabs">
        <button class="admin-tab active" id="tabBtnBookings" onclick="showTab('bookings')">📋 Bookings</button>
        <button class="admin-tab" id="tabBtnMarket"   onclick="showTab('market')">📊 Market Trends</button>
        <button class="admin-tab" id="tabBtnEvents"   onclick="showTab('events')">📅 Events</button>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>

    <div class="admin-content">

      <!-- BOOKINGS TAB -->
      <div id="tabBookings">
        <div class="kpi-row" id="kpiRow"></div>
        <div class="section-header">
          <h2>Bookings</h2>
          <button class="btn primary" style="padding:.5rem 1.25rem;font-size:.875rem" onclick="openModal()">+ New Booking</button>
        </div>
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Guest</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Nights</th>
                <th>Rate/Night</th>
                <th>Total</th>
                <th>Deposit</th>
                <th>Balance</th>
                <th>Source</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookingsTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- MARKET TAB -->
      <div id="tabMarket" style="display:none">
        <div class="season-tabs">
          <button class="season-tab active" id="sBtnSummer"   onclick="showSeason('summer',this)">☀️ Summer (Jun–Aug)</button>
          <button class="season-tab"        id="sBtnHolidays" onclick="showSeason('holidays',this)">🎆 Holidays</button>
          <button class="season-tab"        id="sBtnFall"     onclick="showSeason('fall',this)">🍂 Fall (Sep–Oct)</button>
          <button class="season-tab"        id="sBtnSpring"   onclick="showSeason('spring',this)">🌸 Spring (Mar–May)</button>
        </div>
        <div id="marketBody"></div>
      </div>

      <!-- EVENTS TAB -->
      <div id="tabEvents" style="display:none">
        <div class="year-toggle">
          <button class="year-btn active" id="yBtn2026" onclick="showYear(2026,this)">2026</button>
          <button class="year-btn"        id="yBtn2025" onclick="showYear(2025,this)">2025</button>
        </div>
        <div class="events-list" id="eventsList"></div>
      </div>

    </div>
  </div>

  <!-- BOOKING MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">New Booking</h2>
      <div class="form-2col">
        <div class="form-row">
          <label>Guest Name *</label>
          <input type="text" id="fGuest" placeholder="Jane Smith">
        </div>
        <div class="form-row">
          <label>Status</label>
          <select id="fStatus">
            <option>Confirmed</option>
            <option>Tentative</option>
            <option>Completed</option>
            <option>Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Email</label>
          <input type="email" id="fEmail" placeholder="jane@email.com">
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input type="tel" id="fPhone" placeholder="(555) 555-5555">
        </div>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Check-In *</label>
          <input type="date" id="fCheckin">
        </div>
        <div class="form-row">
          <label>Check-Out *</label>
          <input type="date" id="fCheckout">
        </div>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Rate / Night ($)</label>
          <input type="number" id="fRate" placeholder="575" min="0">
        </div>
        <div class="form-row">
          <label>Deposit Received ($)</label>
          <input type="number" id="fDeposit" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-row">
        <label>Booking Source</label>
        <select id="fSource">
          <option value="">— Select —</option>
          <option>Southern Coast Vacations</option>
          <option>VRBO</option>
          <option>Direct</option>
          <option>Referral</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-row">
        <label>Notes</label>
        <textarea id="fNotes" rows="2" placeholder="Any notes about this booking..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeModal()">Cancel</button>
        <button class="btn primary" onclick="saveBooking()">Save Booking</button>
      </div>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'paradise2025';
    const STORE_KEY  = 'paradise_bookings_v1';

    // ── Auth ────────────────────────────────────────────────
    function doLogin() {
      const u = document.getElementById('lUser').value.trim();
      const p = document.getElementById('lPass').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('pa_auth', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').classList.add('visible');
        renderBookings();
        renderMarket('summer');
        renderEvents(2026);
      } else {
        document.getElementById('lError').style.display = 'block';
      }
    }

    document.getElementById('lPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function signOut() {
      sessionStorage.removeItem('pa_auth');
      location.reload();
    }

    if (sessionStorage.getItem('pa_auth') === '1') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').classList.add('visible');
      renderBookings();
      renderMarket('summer');
      renderEvents(2026);
    }

    // ── Tab navigation ──────────────────────────────────────
    let activeTab = 'bookings';
    function showTab(name) {
      ['bookings','market','events'].forEach(t => {
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === name ? '' : 'none';
        document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === name);
      });
      activeTab = name;
    }

    // ── Bookings ────────────────────────────────────────────
    let bookings = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
    let editingId = null;

    function persist() { localStorage.setItem(STORE_KEY, JSON.stringify(bookings)); }

    function calcNights(ci, co) {
      const n = (new Date(co) - new Date(ci)) / 86400000;
      return isFinite(n) && n > 0 ? n : 0;
    }

    function $$(n) { return '$' + Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 0 }); }

    function fmtDate(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${m}/${day}/${y}`;
    }

    function renderBookings() {
      const active = bookings.filter(b => b.status !== 'Cancelled');
      const totRev = active.reduce((s, b) => s + calcNights(b.ci, b.co) * (b.rate || 0), 0);
      const totDep = active.reduce((s, b) => s + (b.deposit || 0), 0);
      const avgNt  = active.length ? active.reduce((s, b) => s + (b.rate || 0), 0) / active.length : 0;

      document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card"><div class="kpi-label">Total Revenue</div><div class="kpi-value">${$$(totRev)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Deposits In</div><div class="kpi-value">${$$(totDep)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Balance Due</div><div class="kpi-value">${$$(totRev - totDep)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Avg / Night</div><div class="kpi-value">${avgNt ? $$(Math.round(avgNt)) : '—'}</div></div>
        <div class="kpi-card"><div class="kpi-label">Bookings</div><div class="kpi-value">${active.length}</div></div>
      `;

      const sorted = [...bookings].sort((a, b) => (a.ci || '').localeCompare(b.ci || ''));
      const tbody = document.getElementById('bookingsTbody');

      if (!sorted.length) {
        tbody.innerHTML = `<tr><td colspan="11" class="empty-note">No bookings yet — click + New Booking to add one.</td></tr>`;
        return;
      }

      const SC = { Confirmed:'s-confirmed', Tentative:'s-tentative', Completed:'s-completed', Cancelled:'s-cancelled' };

      tbody.innerHTML = sorted.map(b => {
        const n = calcNights(b.ci, b.co);
        const tot = n * (b.rate || 0);
        const bal = tot - (b.deposit || 0);
        return `<tr>
          <td><div style="font-weight:600">${b.guest}</div><div style="font-size:.78rem;color:var(--muted)">${b.email || ''}</div></td>
          <td>${fmtDate(b.ci)}</td>
          <td>${fmtDate(b.co)}</td>
          <td>${n}</td>
          <td>${b.rate ? $$(b.rate) : '—'}</td>
          <td>${tot ? $$(tot) : '—'}</td>
          <td>${b.deposit ? $$(b.deposit) : '—'}</td>
          <td style="color:${bal > 0 ? '#fbbf24' : 'var(--muted)'}">${tot ? $$(bal) : '—'}</td>
          <td style="color:var(--muted);font-size:.82rem">${b.source || '—'}</td>
          <td><span class="status-badge ${SC[b.status] || 's-tentative'}">${b.status}</span></td>
          <td>
            <button class="btn-sm" onclick="openModal('${b.id}')">Edit</button>
            <button class="btn-sm del" onclick="delBooking('${b.id}')">Delete</button>
          </td>
        </tr>`;
      }).join('');
    }

    function openModal(id) {
      editingId = id || null;
      const b = id ? bookings.find(x => x.id === id) : null;
      document.getElementById('modalTitle').textContent = b ? 'Edit Booking' : 'New Booking';
      document.getElementById('fGuest').value   = b?.guest   || '';
      document.getElementById('fEmail').value   = b?.email   || '';
      document.getElementById('fPhone').value   = b?.phone   || '';
      document.getElementById('fCheckin').value = b?.ci      || '';
      document.getElementById('fCheckout').value= b?.co      || '';
      document.getElementById('fRate').value    = b?.rate    || '';
      document.getElementById('fDeposit').value = b?.deposit || '';
      document.getElementById('fSource').value  = b?.source  || '';
      document.getElementById('fNotes').value   = b?.notes   || '';
      document.getElementById('fStatus').value  = b?.status  || 'Confirmed';
      document.getElementById('modalOverlay').classList.remove('hidden');
      document.getElementById('fGuest').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      editingId = null;
    }

    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    function delBooking(id) {
      if (!confirm('Delete this booking? This cannot be undone.')) return;
      bookings = bookings.filter(b => b.id !== id);
      persist();
      renderBookings();
    }

    function saveBooking() {
      const guest = document.getElementById('fGuest').value.trim();
      if (!guest) { alert('Guest name is required.'); return; }
      const data = {
        id:      editingId || Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
        guest,
        email:   document.getElementById('fEmail').value.trim(),
        phone:   document.getElementById('fPhone').value.trim(),
        ci:      document.getElementById('fCheckin').value,
        co:      document.getElementById('fCheckout').value,
        rate:    parseFloat(document.getElementById('fRate').value)    || 0,
        deposit: parseFloat(document.getElementById('fDeposit').value) || 0,
        source:  document.getElementById('fSource').value,
        notes:   document.getElementById('fNotes').value.trim(),
        status:  document.getElementById('fStatus').value,
      };
      if (editingId) {
        const i = bookings.findIndex(b => b.id === editingId);
        bookings[i] = data;
      } else {
        bookings.push(data);
      }
      persist();
      closeModal();
      renderBookings();
    }

    const SEASON_NAMES = {
      summer:   'Summer — June, July & August (Peak Season)',

    function showSeason(s, btn) {
      currentSeason = s;
      document.querySelectorAll('.season-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMarket(s);
    }

    function renderMarket(season) {
      const data = COMPS.map(c => ({ ...c, r: c.rates[season], mid: (c.rates[season].lo + c.rates[season].hi) / 2 }));
      const me = data.find(c => c.isMe);
      const comps = data.filter(c => !c.isMe);
      const compAvg = comps.reduce((s, c) => s + c.mid, 0) / comps.length;
      const diff = ((me.mid - compAvg) / compAvg * 100).toFixed(1);
      const diffTxt = diff > 0 ? `+${diff}%` : `${diff}%`;
      const diffColor = Math.abs(diff) < 5 ? '#94a3b8' : diff < 0 ? '#34d399' : '#fbbf24';
      const pos = diff < -5 ? 'below market — opportunity to raise rates' : diff > 5 ? 'above market' : 'in line with market';

      const sorted = [me, ...comps.sort((a, b) => a.mid - b.mid)];

      document.getElementById('marketBody').innerHTML = `
        <div class="market-summary">
          <div class="market-summary-item">
            <div class="ms-label">Season</div>
            <div class="ms-val" style="font-size:.95rem">${SEASON_NAMES[season]}</div>
          </div>
          <div class="market-summary-item">
            <div class="ms-label">Paradise Midpoint</div>
            <div class="ms-val" style="color:var(--accent)">${$$(me.mid)}/night</div>
          </div>
          <div class="market-summary-item">
            <div class="ms-label">Comp Avg</div>
            <div class="ms-val">${$$(Math.round(compAvg))}/night</div>
          </div>
          <div class="market-summary-item">
            <div class="ms-label">Positioning</div>
            <div class="ms-val" style="color:${diffColor}">${diffTxt} — ${pos}</div>
          </div>
        </div>

          ${sorted.map(c => `
            <div class="comp-row ${c.isMe ? 'is-paradise' : ''}">
              <div>
                <div class="comp-name">${c.isMe ? '⭐ ' : ''}${c.name}</div>
                <div class="comp-meta">${c.sub}</div>
                <div class="comp-meta">${c.beds}BR / ${c.baths}BA · Pool ✅ · ${c.manager}</div>
              </div>
              <div>
                <div class="rate-label">Nightly Low</div>
                <div class="rate-val ${c.isMe ? 'highlight' : ''}">${$$(c.r.lo)}</div>
              </div>
              <div>
                <div class="rate-label">Nightly High</div>
                <div class="rate-val ${c.isMe ? 'highlight' : ''}">${$$(c.r.hi)}</div>
              </div>
              <div>
                <div class="rate-label">Weekly Range</div>
                <div class="rate-val ${c.isMe ? 'highlight' : ''}">${$$(c.r.wlo)} – ${$$(c.r.whi)}</div>
              </div>
              <div>
                <div class="rate-label">Midpoint</div>
                <div class="rate-val ${c.isMe ? 'highlight' : ''}" style="font-size:1.1rem">${$$(c.mid)}/night</div>
              </div>
            </div>
          `).join('')}

      `;

    function renderEvents(yr) {
      const evts = EVENTS[yr] || [];
      const byMonth = {};
      evts.forEach(e => { (byMonth[e.month] = byMonth[e.month] || []).push(e); });
      const months = MONTH_ORDER.filter(m => byMonth[m]);

      document.getElementById('eventsList').innerHTML = months.map(m => `
        <div class="event-month-card">
          <div class="event-month-head">
            <span>${m} ${yr}</span>
            <span style="font-size:.78rem;color:var(--muted)">${byMonth[m].length} event${byMonth[m].length !== 1 ? 's' : ''}</span>
