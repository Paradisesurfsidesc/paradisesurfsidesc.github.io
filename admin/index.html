<!-- admin/index.html -->
<!-- Date - 2026-05-03 -->
<!-- Version - 1.0.0 -->
<!-- Notes - Password-protected admin: bookings, market report, events calendar -->
<!-- Author - David Taylor -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Admin — Paradise Surfside Beach</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    /* ── Login ─────────────────────────────────────────────── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 360px;
    }
    .login-card h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
    .login-card > p { color: var(--muted); font-size: .9rem; margin: 0 0 2rem; }
    .login-field { display: grid; gap: .4rem; margin-bottom: 1rem; }
    .login-field label { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .login-field input {
      padding: .75rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }
    .login-field input:focus { border-color: var(--accent); }
    .login-error { color: #f87171; font-size: .875rem; margin-bottom: .75rem; display: none; }
    .login-btn {
      width: 100%;
      padding: .875rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: #1b1b1b;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* ── Admin shell ────────────────────────────────────────── */
    .admin-screen { display: none; min-height: 100vh; flex-direction: column; }
    .admin-screen.visible { display: flex; }

    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .875rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--cardBorder);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .admin-brand { font-weight: 800; font-size: 1rem; white-space: nowrap; }
    .admin-brand span { color: var(--accent); }

    .admin-tabs { display: flex; gap: .25rem; }
    .admin-tab {
      padding: .45rem .9rem;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: .875rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
      transition: all .15s;
    }
    .admin-tab.active { background: var(--accent); color: #1b1b1b; }

    .signout-btn {
      padding: .4rem .875rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: var(--muted);
      font-size: .8rem;
      font-family: inherit;
      cursor: pointer;
    }
    .signout-btn:hover { color: var(--text); }

    .admin-content {
      flex: 1;
      padding: 1.5rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* ── KPI row ────────────────────────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .kpi-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; margin-bottom: .3rem; }
    .kpi-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

    /* ── Section header ─────────────────────────────────────── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-header h2 { font-size: 1.1rem; margin: 0; }

    /* ── Table ──────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--cardBorder); }
    .admin-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .admin-table th {
      padding: .625rem 1rem;
      text-align: left;
      background: var(--surface);
      color: var(--muted);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--cardBorder);
      white-space: nowrap;
    }
    .admin-table td {
      padding: .75rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      vertical-align: middle;
      white-space: nowrap;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: rgba(255,255,255,.03); }

    .status-badge { display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .72rem; font-weight: 700; }
    .s-confirmed { background: rgba(52,211,153,.15); color: #34d399; }
    .s-tentative  { background: rgba(251,191,36,.15); color: #fbbf24; }
    .s-completed  { background: rgba(148,163,184,.15); color: #94a3b8; }
    .s-cancelled  { background: rgba(248,113,113,.15); color: #f87171; }

    .btn-sm {
      padding: .28rem .65rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.15);
      background: transparent;
      color: var(--muted);
      font-size: .78rem;
      font-family: inherit;
      cursor: pointer;
      margin-left: .25rem;
    }
    .btn-sm:hover { color: var(--text); }
    .btn-sm.del:hover { color: #f87171; border-color: rgba(248,113,113,.4); }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { margin: 0 0 1.5rem; font-size: 1.2rem; }

    .form-row { display: grid; gap: .4rem; margin-bottom: 1rem; }
    .form-row label { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .form-row input,
    .form-row select,
    .form-row textarea {
      padding: .625rem .875rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      color: var(--text);
      font-size: .9rem;
      font-family: inherit;
      outline: none;
    }
    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus { border-color: var(--accent); }
    .form-row select option { background: #0b1b2a; }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; }

    /* ── Market ─────────────────────────────────────────────── */
    .season-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .season-tab {
      padding: .5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--cardBorder);
      background: var(--surface);
      color: var(--muted);
      font-size: .875rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
    }
    .season-tab.active { border-color: var(--accent); color: var(--accent); }

    .market-summary {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .market-summary-item .ms-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; margin-bottom: .2rem; }
    .market-summary-item .ms-val { font-size: 1.15rem; font-weight: 800; }

    .comp-grid { display: grid; gap: .75rem; }
    .comp-row {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 12px;
      padding: .875rem 1.25rem;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1.2fr;
      gap: 1rem;
      align-items: center;
    }
    .comp-row.is-paradise { border-color: var(--accent); background: rgba(255,200,50,.04); }
    .comp-name { font-weight: 700; font-size: .95rem; }
    .comp-meta { font-size: .78rem; color: var(--muted); margin-top: .15rem; line-height: 1.4; }
    .rate-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
    .rate-val { font-weight: 700; font-size: .95rem; }
    .rate-val.highlight { color: var(--accent); }

    /* ── Events ─────────────────────────────────────────────── */
    .year-toggle { display: flex; gap: .25rem; margin-bottom: 1.5rem; }
    .year-btn {
      padding: .5rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--cardBorder);
      background: var(--surface);
      color: var(--muted);
      font-size: .9rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 700;
    }
    .year-btn.active { background: var(--accent); color: #1b1b1b; border-color: var(--accent); }

    .events-list { display: grid; gap: .75rem; }
    .event-month-card {
      background: var(--surface);
      border: 1px solid var(--cardBorder);
      border-radius: 12px;
      overflow: hidden;
    }
    .event-month-head {
      padding: .625rem 1.25rem;
      background: rgba(255,255,255,.04);
      font-weight: 700;
      font-size: .9rem;
      border-bottom: 1px solid var(--cardBorder);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .event-item {
      padding: .625rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: .75rem;
      align-items: start;
      font-size: .875rem;
    }
    .event-item:last-child { border-bottom: none; }
    .event-date { color: var(--muted); font-size: .8rem; padding-top: .1rem; white-space: nowrap; }
    .event-name { font-weight: 600; }
    .event-detail { font-size: .78rem; color: var(--muted); margin-top: .1rem; }
    .impact { font-size: .7rem; font-weight: 700; padding: .15rem .5rem; border-radius: 999px; white-space: nowrap; }
    .impact-high     { background: rgba(248,113,113,.15); color: #f87171; }
    .impact-moderate { background: rgba(251,191,36,.15);  color: #fbbf24; }
    .impact-low      { background: rgba(148,163,184,.15); color: #94a3b8; }

    .empty-note { padding: 2rem; text-align: center; color: var(--muted); }

    /* ── Booking Pace ───────────────────────────────────────── */
    .pace-grid {
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: .35rem;
      margin-bottom: .75rem;
    }
    .pace-cell {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: .62rem;
      font-weight: 700;
      cursor: default;
      position: relative;
      border: 1px solid rgba(255,255,255,.06);
      transition: transform .1s;
    }
    .pace-cell:hover { transform: scale(1.12); z-index: 10; }
    .pace-cell .pw { font-size: .55rem; color: rgba(255,255,255,.5); margin-bottom: .1rem; }
    .pace-cell .pp { font-size: .68rem; }
    .pace-cell.p0   { background: rgba(255,255,255,.05); }
    .pace-cell.p1   { background: rgba(251,191,36,.18); }
    .pace-cell.p50  { background: rgba(251,191,36,.45); }
    .pace-cell.p100 { background: rgba(52,211,153,.35); }

    .pace-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #0b1b2a;
      border: 1px solid var(--cardBorder);
      border-radius: 8px;
      padding: .4rem .65rem;
      white-space: nowrap;
      font-size: .75rem;
      font-weight: 400;
      color: var(--text);
      pointer-events: none;
      display: none;
      z-index: 50;
    }
    .pace-cell:hover .pace-tooltip { display: block; }

    .pace-quarter-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 700;
      margin: .75rem 0 .4rem;
    }

    @media (max-width: 700px) {
      .admin-tabs { gap: .125rem; }
      .admin-tab { padding: .4rem .6rem; font-size: .78rem; }
      .comp-row { grid-template-columns: 1fr 1fr; }
      .form-2col { grid-template-columns: 1fr; }
      .event-item { grid-template-columns: 1fr; gap: .25rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>🏠 Paradise Admin</h1>
      <p>Sign in to manage bookings and market data.</p>
      <div class="login-field">
        <label for="lUser">Username</label>
        <input type="text" id="lUser" value="admin" autocomplete="username">
      </div>
      <div class="login-field">
        <label for="lPass">Password</label>
        <input type="password" id="lPass" autocomplete="current-password">
      </div>
      <div class="login-error" id="lError">Incorrect username or password.</div>
      <button class="login-btn" onclick="doLogin()">Sign In</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin-screen" id="adminScreen">
    <div class="admin-topbar">
      <div class="admin-brand">🏠 Paradise <span>Admin</span></div>
      <div class="admin-tabs">
        <button class="admin-tab active" id="tabBtnBookings" onclick="showTab('bookings')">📋 Bookings</button>
        <button class="admin-tab" id="tabBtnMarket"   onclick="showTab('market')">📊 Market Trends</button>
        <button class="admin-tab" id="tabBtnEvents"   onclick="showTab('events')">📅 Events</button>
        <button class="admin-tab" id="tabBtnScv"      onclick="showTab('scv')">🏢 SCV Portfolio</button>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>

    <div class="admin-content">

      <!-- BOOKINGS TAB -->
      <div id="tabBookings">
        <div class="kpi-row" id="kpiRow"></div>
        <div class="section-header">
          <h2>Bookings</h2>
          <button class="btn primary" style="padding:.5rem 1.25rem;font-size:.875rem" onclick="openModal()">+ New Booking</button>
        </div>
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Guest</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Nights</th>
                <th>Rate/Night</th>
                <th>Total</th>
                <th>Deposit</th>
                <th>Balance</th>
                <th>Source</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="bookingsTbody"></tbody>
          </table>
        </div>
      </div>

        <div class="section-header" style="margin-top:2rem">
          <h2>Booking Pace — Week by Week</h2>
          <select id="paceYear" onchange="renderPace(parseInt(this.value))" style="padding:.4rem .75rem;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(--text);font-family:inherit;font-size:.875rem;outline:none">
            <option>2024</option>
            <option>2025</option>
            <option selected>2026</option>
            <option>2027</option>
          </select>
        </div>
        <div id="bookingPace"></div>
      </div>

      <!-- MARKET TAB -->
      <div id="tabMarket" style="display:none">
        <div class="season-tabs">
          <button class="season-tab active" id="sBtnSummer"   onclick="showSeason('summer',this)">☀️ Summer (Jun–Aug)</button>
          <button class="season-tab"        id="sBtnHolidays" onclick="showSeason('holidays',this)">🎆 Holidays</button>
          <button class="season-tab"        id="sBtnFall"     onclick="showSeason('fall',this)">🍂 Fall (Sep–Oct)</button>
          <button class="season-tab"        id="sBtnSpring"   onclick="showSeason('spring',this)">🌸 Spring (Mar–May)</button>
        </div>
        <div id="marketBody"></div>
      </div>

      <!-- EVENTS TAB -->
      <div id="tabEvents" style="display:none">
        <div class="year-toggle">
          <button class="year-btn active" id="yBtn2026" onclick="showYear(2026,this)">2026</button>
          <button class="year-btn"        id="yBtn2025" onclick="showYear(2025,this)">2025</button>
        </div>
        <div class="events-list" id="eventsList"></div>
      </div>

      <!-- SCV PORTFOLIO TAB -->
      <div id="tabScv" style="display:none">
        <div id="scvBody"></div>
      </div>

    </div>
  </div>

  <!-- BOOKING MODAL -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">New Booking</h2>
      <div class="form-2col">
        <div class="form-row">
          <label>Guest Name *</label>
          <input type="text" id="fGuest" placeholder="Jane Smith">
        </div>
        <div class="form-row">
          <label>Status</label>
          <select id="fStatus">
            <option>Confirmed</option>
            <option>Tentative</option>
            <option>Completed</option>
            <option>Cancelled</option>
          </select>
        </div>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Email</label>
          <input type="email" id="fEmail" placeholder="jane@email.com">
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input type="tel" id="fPhone" placeholder="(555) 555-5555">
        </div>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Check-In *</label>
          <input type="date" id="fCheckin">
        </div>
        <div class="form-row">
          <label>Check-Out *</label>
          <input type="date" id="fCheckout">
        </div>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Rate / Night ($)</label>
          <input type="number" id="fRate" placeholder="575" min="0">
        </div>
        <div class="form-row">
          <label>Deposit Received ($)</label>
          <input type="number" id="fDeposit" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-row">
        <label>Booking Source</label>
        <select id="fSource">
          <option value="">— Select —</option>
          <option>Southern Coast Vacations</option>
          <option>VRBO</option>
          <option>Direct</option>
          <option>Referral</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-row">
        <label>Notes</label>
        <textarea id="fNotes" rows="2" placeholder="Any notes about this booking..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeModal()">Cancel</button>
        <button class="btn primary" onclick="saveBooking()">Save Booking</button>
      </div>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'paradise2025';
    const STORE_KEY  = 'paradise_bookings_v1';

    // ── Auth ────────────────────────────────────────────────
    function doLogin() {
      const u = document.getElementById('lUser').value.trim();
      const p = document.getElementById('lPass').value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('pa_auth', '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').classList.add('visible');
        loadSeedIfEmpty();
        renderBookings();
        renderMarket('summer');
        renderEvents(2026);
      } else {
        document.getElementById('lError').style.display = 'block';
      }
    }

    document.getElementById('lPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function signOut() {
      sessionStorage.removeItem('pa_auth');
      location.reload();
    }

    // ── Tab navigation ──────────────────────────────────────
    let activeTab = 'bookings';
    function showTab(name) {
      ['bookings','market','events','scv'].forEach(t => {
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === name ? '' : 'none';
        document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === name);
      });
      activeTab = name;
      if (name === 'scv') renderSCV();
    }

    // ── Bookings ────────────────────────────────────────────
    let bookings = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
    let editingId = null;

    function persist() { localStorage.setItem(STORE_KEY, JSON.stringify(bookings)); }

    function calcNights(ci, co) {
      const n = (new Date(co) - new Date(ci)) / 86400000;
      return isFinite(n) && n > 0 ? n : 0;
    }

    function $$(n) { return '$' + Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 0 }); }

    function fmtDate(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${m}/${day}/${y}`;
    }

    // ── Historical seed data (SCV export 2017-2026) ─────────
    // Format: [resNum, guestName, checkIn, checkOut, ratePerNight, source, status, notes]
    const SEED_HISTORICAL = [
      // 2026 — Confirmed
      ['RES-10934','Guest Reserved','2026-07-18','2026-07-25',775,'Southern Coast Vacations','Confirmed',''],
      ['RES-10948','Guest Reserved','2026-07-11','2026-07-18',775,'Southern Coast Vacations','Confirmed',''],

    function loadSeedIfEmpty() {
      if (bookings.length > 0) return;
      bookings = SEED_HISTORICAL.map(s => ({
        id:      s[0],
        guest:   s[1],
        email:   '',
        phone:   '',
        ci:      s[2],
        co:      s[3],
        rate:    s[4],
        deposit: 0,
        source:  s[5],
        notes:   s[7],
        status:  s[6],
      }));
      persist();
    }

    function renderPace(year) {
      year = year || parseInt(document.getElementById('paceYear')?.value) || new Date().getFullYear();
      const el = document.getElementById('bookingPace');
      if (!el) return;

      // Build 52 week windows starting Jan 1
      const jan1 = new Date(year, 0, 1);
      const weeks = Array.from({ length: 52 }, (_, i) => {
        const start = new Date(jan1);
        start.setDate(1 + i * 7);
        const end = new Date(start);
        end.setDate(start.getDate() + 6);
        return { num: i + 1, start, end, booked: 0, total: 7 };
      });
      // Week 52 runs to Dec 31
      weeks[51].end = new Date(year, 11, 31);
      weeks[51].total = Math.round((weeks[51].end - weeks[51].start) / 86400000) + 1;

      // Count booked nights per week from confirmed/tentative bookings
      bookings.filter(b => b.status !== 'Cancelled' && b.ci && b.co).forEach(b => {
        let cur = new Date(b.ci);
        const out = new Date(b.co);
        while (cur < out) {
          if (cur.getFullYear() === year) {
            const dayOfYear = Math.floor((cur - jan1) / 86400000);
            const wi = Math.min(Math.floor(dayOfYear / 7), 51);
            weeks[wi].booked++;
          }
          cur.setDate(cur.getDate() + 1);
        }
      });

      const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const qLabels = ['Q1 — January through March', 'Q2 — April through June', 'Q3 — July through September', 'Q4 — October through December'];

      let html = '';
      [0, 13, 26, 39].forEach((start, qi) => {
        const chunk = weeks.slice(start, start + 13);
        html += `<div class="pace-quarter-label">${qLabels[qi]}</div><div class="pace-grid">`;
        chunk.forEach(w => {
          const pct = w.total > 0 ? Math.round((w.booked / w.total) * 100) : 0;
          const cls = pct === 0 ? 'p0' : pct === 100 ? 'p100' : pct >= 50 ? 'p50' : 'p1';
          const label = pct === 0 ? '—' : pct + '%';
          html += `
            <div class="pace-cell ${cls}">
              <span class="pw">W${w.num}</span>
              <span class="pp">${label}</span>
              <div class="pace-tooltip">${fmt(w.start)}–${fmt(w.end)}<br>${w.booked}/${w.total} nights · ${pct}%</div>
            </div>`;
        });
        html += '</div>';
      });

      el.innerHTML = html;
    }

    function renderBookings() {
      const active = bookings.filter(b => b.status !== 'Cancelled');
      const totRev = active.reduce((s, b) => s + calcNights(b.ci, b.co) * (b.rate || 0), 0);
      const totDep = active.reduce((s, b) => s + (b.deposit || 0), 0);
      const avgNt  = active.length ? active.reduce((s, b) => s + (b.rate || 0), 0) / active.length : 0;

      document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card"><div class="kpi-label">Total Revenue</div><div class="kpi-value">${$$(totRev)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Deposits In</div><div class="kpi-value">${$$(totDep)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Balance Due</div><div class="kpi-value">${$$(totRev - totDep)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Avg / Night</div><div class="kpi-value">${avgNt ? $$(Math.round(avgNt)) : '—'}</div></div>
        <div class="kpi-card"><div class="kpi-label">Bookings</div><div class="kpi-value">${active.length}</div></div>
      `;

      const sorted = [...bookings].sort((a, b) => (a.ci || '').localeCompare(b.ci || ''));
      const tbody = document.getElementById('bookingsTbody');

      if (!sorted.length) {
        tbody.innerHTML = `<tr><td colspan="11" class="empty-note">No bookings yet — click + New Booking to add one.</td></tr>`;
        return;
      }

      const SC = { Confirmed:'s-confirmed', Tentative:'s-tentative', Completed:'s-completed', Cancelled:'s-cancelled' };

      tbody.innerHTML = sorted.map(b => {
        const n = calcNights(b.ci, b.co);
        const tot = n * (b.rate || 0);
        const bal = tot - (b.deposit || 0);
        return `<tr>
          <td><div style="font-weight:600">${b.guest}</div><div style="font-size:.78rem;color:var(--muted)">${b.email || ''}</div></td>
          <td>${fmtDate(b.ci)}</td>
          <td>${fmtDate(b.co)}</td>
          <td>${n}</td>
          <td>${b.rate ? $$(b.rate) : '—'}</td>
          <td>${tot ? $$(tot) : '—'}</td>
          <td>${b.deposit ? $$(b.deposit) : '—'}</td>
          <td style="color:${bal > 0 ? '#fbbf24' : 'var(--muted)'}">${tot ? $$(bal) : '—'}</td>
          <td style="color:var(--muted);font-size:.82rem">${b.source || '—'}</td>
          <td><span class="status-badge ${SC[b.status] || 's-tentative'}">${b.status}</span></td>
          <td>
            <button class="btn-sm" onclick="openModal('${b.id}')">Edit</button>
            <button class="btn-sm del" onclick="delBooking('${b.id}')">Delete</button>
          </td>
        </tr>`;
      }).join('');

      renderPace();
    }

      const guest = document.getElementById('fGuest').value.trim();

      const data = {

        pets: true, highlight: 'Grand Atlantic Resort amenity access',
        url: 'https://www.southerncoastvacations.com/myrtle-beach-vacation-rentals',
      },
      {
        name: 'Hermitage Myrtle Lake D3', group: 'Condos & Smaller',
        location: 'Surfside Beach', beds: 2, baths: 2, sleeps: 6,
        pool: 'Communal pool', beach: 'Walking distance to Pier',

      {

      {

        location: 'Myrtle Beach', beds: 2, baths: 2, sleeps: 6,

        pets: false, highlight: 'Golf course community, near airport',
        url: 'https://www.southerncoastvacations.com/myrtle-beach-vacation-rentals',
      },
    ];

    let scvFilter = 'all';

    function setScvFilter(f) {
      scvFilter = f;
      renderSCV();
    }

    function renderSCV() {
      const houses = SCV_PROPS.filter(p => p.group === 'Houses — Private Pool');
      const paradise = SCV_PROPS.find(p => p.isMe);
      const otherHouses = houses.filter(p => !p.isMe);
      const avgSleeps = Math.round(otherHouses.reduce((s, p) => s + p.sleeps, 0) / otherHouses.length);

      const filtered = scvFilter === 'houses'
        ? SCV_PROPS.filter(p => p.group === 'Houses — Private Pool')
        : scvFilter === 'condos'
          ? SCV_PROPS.filter(p => p.group === 'Condos & Smaller')
          : SCV_PROPS;

      const groups = ['Houses — Private Pool', 'Condos & Smaller'].filter(g => filtered.some(p => p.group === g));

      document.getElementById('scvBody').innerHTML = `
        <div class="market-summary" style="margin-bottom:1.5rem">
          <div class="market-summary-item">
            <div class="ms-label">Total SCV Properties</div>
            <div class="ms-val">${SCV_PROPS.length}</div>
          </div>
          <div class="market-summary-item">
            <div class="ms-label">Houses w/ Private Pool</div>
            <div class="ms-val">${houses.length}</div>
          </div>
          <div class="market-summary-item">
            <div class="ms-label">Paradise Sleeps</div>
            <div class="ms-val" style="color:var(--accent)">${paradise.sleeps}</div>
          </div>
          <div class="market-summary-item">
            <div class="ms-label">Avg Sleeps (houses)</div>
            <div class="ms-val">${avgSleeps}</div>
          </div>
          <div class="market-summary-item">
            <div class="ms-label">Heated Pool in Surfside</div>
            <div class="ms-val" style="color:#34d399">✅ Only Paradise</div>
          </div>
        </div>

        <div style="display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap">
          <button class="season-tab ${scvFilter==='all'?'active':''}"    onclick="setScvFilter('all')">All (${SCV_PROPS.length})</button>
          <button class="season-tab ${scvFilter==='houses'?'active':''}" onclick="setScvFilter('houses')">Houses w/ Pool (${houses.length})</button>
          <button class="season-tab ${scvFilter==='condos'?'active':''}" onclick="setScvFilter('condos')">Condos & Smaller (${SCV_PROPS.length - houses.length})</button>
        </div>

        ${groups.map(g => {
          const props = filtered.filter(p => p.group === g);
          return `
            <h3 style="font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 .6rem">${g}</h3>
            <div class="table-wrap" style="margin-bottom:1.25rem">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Property</th>
                    <th>Location</th>
                    <th>BR / BA</th>
                    <th>Sleeps</th>
                    <th>Pool</th>
                    <th>Beach</th>
                    <th>Pets</th>
                    <th>Standout</th>
                    <th>Link</th>
                  </tr>
                </thead>
                <tbody>
                  ${props.map(p => `
                    <tr style="${p.isMe ? 'background:rgba(255,200,50,.07)' : ''}">
                      <td style="font-weight:700;white-space:nowrap">${p.isMe ? '⭐ ' : ''}${p.name}${p.isMe ? ' <span style="font-size:.7rem;color:var(--accent);font-weight:400">(You)</span>' : ''}</td>
                      <td style="white-space:nowrap;font-size:.85rem">${p.location}</td>
                      <td style="white-space:nowrap">${p.beds}BR / ${p.baths}BA</td>
                      <td style="font-weight:700;color:${p.isMe ? 'var(--accent)' : 'inherit'}">${p.sleeps}</td>
                      <td style="font-size:.8rem;max-width:170px;white-space:normal;line-height:1.35">${p.pool}</td>
                      <td style="font-size:.8rem;white-space:nowrap">${p.beach}</td>
                      <td style="text-align:center">${p.pets ? '🐾' : '—'}</td>
                      <td style="font-size:.8rem;color:var(--muted);max-width:190px;white-space:normal;line-height:1.35">${p.highlight}</td>
                      <td><a href="${p.url}" target="_blank" rel="noopener noreferrer" style="color:var(--accent);font-size:.82rem;white-space:nowrap">View ↗</a></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `;
        }).join('')}
      `;
    }

    // ── Init if already logged in ───────────────────────────
    if (sessionStorage.getItem('pa_auth') === '1') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').classList.add('visible');
      loadSeedIfEmpty();
      renderBookings();
      renderMarket('summer');
      renderEvents(2026);
    }
  </script>
</body>
</html>
